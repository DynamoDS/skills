name: Validate Skills

on:
  pull_request:
    paths:
      - "skills/**"

env:
  SKILLS_DIR: skills

jobs:
  validate_skills:
    name: Validate Skills
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: false
      - name: Install skill-validator
        run: go install github.com/agent-ecosystem/skill-validator/cmd/skill-validator@v1.2.1
      - name: Validate changed skills
        run: bash .github/scripts/validate_skills.sh "${{ github.base_ref }}" "$SKILLS_DIR"
